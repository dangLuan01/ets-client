name: CI/CD for Nextjs

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout source code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Build Next.js app
        run: npm run build

      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "🔄 Pulling latest code..."
            cd ${{ secrets.VPS_CLIENT_PATH }}
            git reset --hard
            git pull origin main
            echo "🐳 Restarting Docker containers..."
            docker compose build
            docker compose up -d --remove-orphans
            echo "🧹 Cleaning up Docker cache and old images..."
            docker builder prune -af
            docker image prune -f
            echo "✅ Deploy completed!"

      - name: 📢 Notify to Telegram
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="*Deploy thành công!*"
          elif [ "$JOB_STATUS" = "cancelled" ]; then
            STATUS_ICON="⚠️"
            STATUS_TEXT="*Deploy bị huỷ!*"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="*Deploy thất bại!*"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=Markdown \
            -d text="${STATUS_ICON} ${STATUS_TEXT} \nRepo: \`${{ github.repository }}\`\nBranch: \`${{ github.ref_name }}\`\nCommit: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
        
